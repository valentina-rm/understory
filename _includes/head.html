<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{%- assign page_title = page.title | default: site.title -%}
{%- if page.url == "/" -%}
  <title>{{ site.title }} — {{ site.tagline }}</title>
{%- else -%}
  <title>{{ page_title }} · {{ site.title }}</title>
{%- endif -%}
<meta name="description" content="{{ page.description | default: site.description | strip_newlines }}">

<meta property="og:type" content="website">
<meta property="og:title" content="{{ page_title }}">
<meta property="og:description" content="{{ page.description | default: site.description | strip_newlines }}">
<meta property="og:site_name" content="{{ site.title }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<link rel="icon" href="{{ '/assets/img/brand/favicon.svg' | relative_url }}" type="image/svg+xml">
