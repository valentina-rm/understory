<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360">
  <rect width="520" height="360" fill="#fafbf4"/>
  <!-- a small wry line-drawing: a sprout reading a newspaper, below a 'canopy' line -->
  <line x1="40" y1="70" x2="480" y2="70" stroke="#cdd4be" stroke-width="1.5"/>
  <circle cx="40" cy="70" r="4" fill="#c2762f"/>
  <text x="48" y="58" font-family="Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" fill="#7c8b5e">ABOVE: WHAT GETS ATTENTION</text>

  <!-- ground -->
  <line x1="60" y1="300" x2="460" y2="300" stroke="#2e4633" stroke-width="2"/>
  <!-- stem -->
  <path d="M260 300 C 258 250, 262 220, 260 190" fill="none" stroke="#2e4633" stroke-width="3" stroke-linecap="round"/>
  <!-- leaves -->
  <path d="M260 215 C 235 205, 222 215, 222 232 C 245 232, 258 225, 260 215Z" fill="#7c8b5e"/>
  <path d="M260 200 C 285 190, 298 200, 298 217 C 275 217, 262 210, 260 200Z" fill="#2e4633"/>
  <!-- a tiny newspaper held up -->
  <g transform="translate(300 150) rotate(-8)">
    <rect width="86" height="60" rx="3" fill="#f2f4ea" stroke="#2e4633" stroke-width="1.5"/>
    <line x1="8" y1="12" x2="78" y2="12" stroke="#7c8b5e" stroke-width="3"/>
    <line x1="8" y1="24" x2="78" y2="24" stroke="#cdd4be" stroke-width="2"/>
    <line x1="8" y1="33" x2="78" y2="33" stroke="#cdd4be" stroke-width="2"/>
    <line x1="8" y1="42" x2="60" y2="42" stroke="#cdd4be" stroke-width="2"/>
  </g>
  <text x="260" y="338" font-family="Georgia, serif" font-style="italic" font-size="15" fill="#3a4a3b" text-anchor="middle">"All the news that's unfit to ignore."</text>
  <text x="480" y="20" font-family="Helvetica, Arial, sans-serif" font-size="9" letter-spacing="2" fill="#c2762f" text-anchor="end">PLACEHOLDER CARTOON</text>
</svg>
